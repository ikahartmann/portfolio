<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grade.</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <header id="main-header" class="main-header">
        <div class="header-glow"></div>
        <div class="header-container">
            <a href="#" class="logo">
               <img src="logo/horizontal branco.webp" data-white="logo/horizontal branco.webp" data-lilac="logo/horizontal branco lilás.webp" alt="grade." class="logo-img" id="logo-img"> 
            </a>
            <div class="search-bar">
                <input type="text" placeholder="Find your grade.">
                <button type="submit"><i class="bx bx-search"></i></button>
            </div>
            <nav class="nav-menu">
                <ul class="nav-links">
                    <li><a href="#">New Releases</a></li>
                    <li><a href="#">Men</a></li>
                    <li><a href="#">Women</a></li>
                    <li><a href="#">Kids</a></li>
                </ul>
                
                <div class="user-actions">
                    <a href="#" class="signup-link">Sign Up</a>
                    <a href="#" title="Log In" class="login-icon"><i class="bx bx-user"></i></a>
                    <a href="#" title="Bag" class="cart-icon">
                        <i class="bx bx-shopping-bag"></i>
                        <span class="cart-count">0</span>
                    </a>
                </div>
                <div class="menu-toggle" id="mobile-menu">
                    <i class='bx bx-menu'></i>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="logo-hero">
                <img src="logo/logo nome preto ciano.svg" alt="logo grade.">
            </div>
            <div class="hero-content">
                <span class="content-wear">wear</span>
                <img src="imgs/woman-hero.png" alt="fashion black woman" class="hero-woman">
                <span class="content-wonder">wonder<span class="dot">.</span></span>
            </div>
        </section>
        <nav>
                <div class="navbottom">
                    <h3 class="menuitem">Nero</h3>
                    <h3 class="menuitem">Augustus</h3>
                    <h3 class="menuitem">Otho</h3>
                    <h3 class="menuitem">Trajan</h3>
                    <h3 class="menuitem">Severus</h3>
                </div>
            </nav>
            <div class="slider">
                <div class="sliderwrapper">
                    <div class="slideritem">
                        <img src="imgs/air.png" alt="slider item" class="sliderimg">
                        <div class="sliderbg"></div>
                        <h1 class="slidertitle">Nero</h1>
                        <h2 class="sliderprice">$199</h2>
                        <a href="#product">
                            <button class="buybutton">BUY NOW!</button>
                        </a>
                    </div>
                    <div class="slideritem">
                        <img src="imgs/jordan.png" alt="slider item" class="sliderimg">
                        <div class="sliderbg"></div>
                        <h1 class="slidertitle">Augustus</h1>
                        <h2 class="sliderprice">$149</h2>
                        <a href="#product">
                            <button class="buybutton">BUY NOW!</button>
                        </a>
                    </div>
                    <div class="slideritem">
                        <img src="imgs/crater.png" alt="slider item" class="sliderimg">
                        <div class="sliderbg"></div>
                        <h1 class="slidertitle">Otho</h1>
                        <h2 class="sliderprice">$129</h2>
                        <a href="#product">
                            <button class="buybutton">BUY NOW!</button>
                        </a>
                    </div>
                    <div class="slideritem">
                        <img src="imgs/blazer.png" alt="slider item" class="sliderimg">
                        <div class="sliderbg"></div>
                        <h1 class="slidertitle">Trajan</h1>
                        <h2 class="sliderprice">$109</h2>
                        <a href="#product">
                            <button class="buybutton">BUY NOW!</button>
                        </a>
                    </div>
                    <div class="slideritem">
                        <img src="imgs/hippie.png" alt="slider item" class="sliderimg">
                        <div class="sliderbg"></div>
                        <h1 class="slidertitle">Severus</h1>
                        <h2 class="sliderprice">$99</h2>
                        <a href="#product">
                            <button class="buybutton">BUY NOW!</button>
                        </a>
                    </div>
                </div>
            </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
